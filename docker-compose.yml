services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cod-hud-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/').then(r => r.status === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
